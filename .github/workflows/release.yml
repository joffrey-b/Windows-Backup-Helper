name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build, publish, and create GitHub Release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: choco install flac -y --no-progress
      - run: dotnet build --configuration Release
      - run: dotnet test --configuration Release
      - name: Publish self-contained single-file win-x64
        run: dotnet publish src/WindowsBackupHelper.App/WindowsBackupHelper.App.csproj --configuration Release -p:PublishProfile=win-x64
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" "src/WindowsBackupHelper.App/bin/Release/net10.0-windows/win-x64/publish/WindowsBackupHelper.exe" --title "${{ github.ref_name }}" --generate-notes
